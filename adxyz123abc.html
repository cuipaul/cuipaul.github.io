<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理</title>
    <!-- 引入富文本编辑器 Quill -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <style>
        /* 现代后台管理样式 */
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --bg: #f8f9fa;
            --white: #ffffff;
            --border: #e9ecef;
            --text: #333333;
            --light-text: #666666;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        
        /* 登录遮罩 */
        #login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-box {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .login-box h3 {
            margin-bottom: 20px;
            color: var(--primary);
        }
        
        .login-box input {
            padding: 12px 16px;
            margin: 10px 0;
            width: 250px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
        }
        
        .login-box button {
            padding: 12px 24px;
            background: var(--accent);
            color: var(--white);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: background 0.3s ease;
        }
        
        .login-box button:hover {
            background: #2980b9;
        }
        
        /* 管理面板 */
        .admin-header {
            background: var(--primary);
            color: var(--white);
            padding: 2rem;
        }
        
        .admin-header h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
        }
        
        .admin-content {
            padding: 2rem;
        }
        
        /* 导航标签 */
        .nav-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        
        .nav-tab {
            padding: 1rem 1.5rem;
            background: #f8f9fa;
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .nav-tab.active {
            background: var(--white);
            border-color: var(--accent);
            color: var(--accent);
        }
        
        /* 面板内容 */
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* 表单样式 */
        .form-section {
            margin-bottom: 3rem;
        }
        
        .form-section h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--accent);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text);
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
            max-width: none;
        }
        
        /* 富文本编辑器高度调整 */
        #profile-editor-info,
        #profile-editor-edu,
        #profile-editor-work,
        #profile-editor-goal {
            height: 200px;
        }
        
        /* 确保管理面板容器足够宽 */
        .admin-container {
            max-width: 1600px;
        }
        
        .admin-content {
            padding: 2rem;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        /* 编辑器样式 */
        .editor-container {
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        
        #editor {
            height: 400px;
        }
        
        /* 富文本编辑器（个人资料） */
        .profile-editor {
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        
        #profile-editor {
            height: 300px;
        }
        
        /* 按钮样式 */
        .btn {
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            color: var(--white);
            font-size: 1rem;
            font-weight: 500;
            transition: background 0.3s ease;
            margin-right: 10px;
        }
        
        .btn-primary {
            background: var(--accent);
        }
        
        .btn-primary:hover {
            background: #2980b9;
        }
        
        .btn-success {
            background: var(--success);
        }
        
        .btn-success:hover {
            background: #229954;
        }
        
        .btn-danger {
            background: var(--danger);
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .btn-warning {
            background: var(--warning);
        }
        
        .btn-warning:hover {
            background: #e67e22;
        }
        
        /* 图片上传区域 */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 6px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(52, 152, 219, 0.05);
        }
        
        .upload-area input {
            display: none;
        }
        
        .upload-area .upload-icon {
            font-size: 2rem;
            color: var(--light-text);
            margin-bottom: 1rem;
        }
        
        .upload-area p {
            margin: 0;
            color: var(--light-text);
        }
        
        /* 预览图 */
        .image-preview {
            margin-top: 1rem;
        }
        
        .preview-img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 6px;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        /* 图片网格 */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .image-item {
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .image-item:hover {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.2);
        }
        
        .image-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
        
        .image-item .image-info {
            padding: 0.5rem;
            background: #f8f9fa;
            font-size: 0.8rem;
            color: var(--light-text);
            text-align: center;
        }
        
        /* 图片选择器弹窗 */
        .image-selector-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .image-selector-content {
            background: var(--white);
            border-radius: 12px;
            padding: 2rem;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            width: 90%;
        }
        
        .image-selector-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .image-selector-header h3 {
            margin: 0;
            color: var(--primary);
        }
        
        .image-selector-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--light-text);
        }
        
        .image-selector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
        }
        
        .image-selector-item {
            border: 2px solid transparent;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .image-selector-item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .image-selector-item.selected {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }
        
        .image-selector-item img {
            width: 100%;
            height: 100px;
            object-fit: cover;
        }
        
        .image-selector-actions {
            margin-top: 2rem;
            text-align: right;
        }
        
        /* 列表表格 */
        .table-container {
            margin-top: 2rem;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: var(--primary);
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .admin-container {
                margin: 0;
                border-radius: 0;
            }
            
            .admin-content {
                padding: 1rem;
            }
            
            .nav-tabs {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .nav-tab {
                border-bottom: 1px solid var(--border);
                border-radius: 8px;
            }
            
            .btn {
                display: block;
                width: 100%;
                margin-bottom: 10px;
                margin-right: 0;
            }
        }
    </style>
</head>
<body>

<!-- 登录弹窗 -->
<div id="login-modal">
    <div class="login-box">
        <h3>管理员登录</h3>
        <input type="password" id="password-input" placeholder="请输入密码">
        <br>
        <button onclick="login()">登录</button>
    </div>
</div>

<div class="admin-container" id="admin-panel" style="display:none;">
    <!-- 管理面板头部 -->
    <div class="admin-header">
        <h2>后台管理中心</h2>
    </div>
    
    <!-- 管理面板内容 -->
    <div class="admin-content">
        <!-- 导航标签 -->
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="switchTab('profile')">个人资料</div>
            <div class="nav-tab" onclick="switchTab('posts')">文章管理</div>
            <div class="nav-tab" onclick="switchTab('images')">图片管理</div>
            <div class="nav-tab" onclick="switchTab('comments')">留言管理</div>
        </div>
        
        <!-- 个人资料标签 -->
        <div class="tab-content active" id="profile-tab">
            <div class="form-section">
                <h3>个人简介配置</h3>
                
                <!-- 头像上传 -->
                <div class="form-group">
                    <label>头像上传</label>
                    <div class="upload-area" onclick="document.getElementById('avatar-upload').click()">
                        <input type="file" id="avatar-upload" accept="image/*" onchange="handleAvatarUpload(this)">
                        <div class="upload-icon">📷</div>
                        <p>点击或拖拽图片到此处上传</p>
                    </div>
                    <div class="image-preview" id="avatar-preview"></div>
                    <input type="hidden" id="conf-avatar" placeholder="头像图片链接">
                </div>
                
                <!-- 背景图片上传 -->
                <div class="form-group">
                    <label>背景图片上传</label>
                    <div class="upload-area" onclick="document.getElementById('background-upload').click()">
                        <input type="file" id="background-upload" accept="image/*" onchange="handleBackgroundUpload(this)">
                        <div class="upload-icon">🖼️</div>
                        <p>点击或拖拽图片到此处上传（首页背景）</p>
                    </div>
                    <div class="image-preview" id="background-preview"></div>
                    <input type="hidden" id="conf-background" placeholder="背景图片链接">
                </div>
                
                <div class="form-group">
                    <label>姓名/昵称</label>
                    <input type="text" id="conf-name" placeholder="请输入姓名或昵称">
                </div>
                
                <div class="form-group">
                    <label>一句话简介</label>
                    <input type="text" id="conf-subtitle" placeholder="请输入一句话简介">
                </div>
                
                <div class="form-group">
                    <label>个人基本信息</label>
                    <div class="profile-editor">
                        <div id="profile-editor-info"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>教育经历</label>
                    <div class="profile-editor">
                        <div id="profile-editor-edu"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>工作经历</label>
                    <div class="profile-editor">
                        <div id="profile-editor-work"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>工作目标</label>
                    <div class="profile-editor">
                        <div id="profile-editor-goal"></div>
                    </div>
                </div>
                
                <button class="btn btn-primary" onclick="saveConfig()">保存个人资料</button>
            </div>
        </div>
        
        <!-- 文章管理标签 -->
        <div class="tab-content" id="posts-tab">
            <div class="form-section">
                <h3>文章编辑 (成长故事 / 学习成果)</h3>
                <input type="hidden" id="post-id">
                
                <div class="form-group">
                    <label>文章标题</label>
                    <input type="text" id="post-title" placeholder="请输入文章标题">
                </div>
                
                <div class="form-group">
                    <label>文章类型</label>
                    <select id="post-type">
                        <option value="story">成长故事</option>
                        <option value="study">学习成果</option>
                    </select>
                </div>
                
                <!-- 封面图选择 -->
                <div class="form-group">
                    <label>封面图选择</label>
                    <div class="upload-area" onclick="showImageSelector()">
                        <div class="upload-icon">🖼️</div>
                        <p>点击选择封面图片（从已上传的图片中选择）</p>
                    </div>
                    <div class="image-preview" id="cover-preview"></div>
                    <input type="hidden" id="post-cover" placeholder="封面图链接">
                </div>
                
                <div class="form-group">
                    <label>文章摘要</label>
                    <textarea id="post-excerpt" placeholder="请输入文章摘要"></textarea>
                </div>
                
                <!-- 富文本编辑器 -->
                <div class="form-group">
                    <label>文章内容</label>
                    <div class="editor-container">
                        <div id="editor"></div>
                    </div>
                </div>
                
                <div style="margin-top: 1.5rem;">
                    <button class="btn btn-success" onclick="savePost()">发布/更新文章</button>
                    <button class="btn btn-warning" onclick="resetForm()">重置/新建</button>
                </div>
            </div>
            
            <!-- 文章列表 -->
            <div class="form-section">
                <h3>已发布文章</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>标题</th>
                                <th>类型</th>
                                <th>日期</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="post-list-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 图片管理标签 -->
        <div class="tab-content" id="images-tab">
            <div class="form-section">
                <h3>图片管理</h3>
                
                <!-- 图片上传 -->
                <div class="form-group">
                    <label>上传图片</label>
                    <div class="upload-area" onclick="document.getElementById('image-upload').click()">
                        <input type="file" id="image-upload" accept="image/*" multiple onchange="handleImageUpload(this)">
                        <div class="upload-icon">🖼️</div>
                        <p>点击或拖拽图片到此处上传</p>
                    </div>
                </div>
                
                <!-- 已上传图片列表 -->
                <div class="form-section">
                    <h3>已上传图片</h3>
                    <div class="image-grid" id="image-grid">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 留言管理标签 -->
        <div class="tab-content" id="comments-tab">
            <div class="form-section">
                <h3>留言管理</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>留言人</th>
                                <th>内容</th>
                                <th>日期</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="comment-list-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/db.js"></script>
<script>
    let quill, profileEditors = {};
    const DEFAULT_PASS = 'wfwt201102'; // 管理员密码

    // 初始化
    window.addEventListener('DOMContentLoaded', async () => {
        try {
            console.log('Admin页面加载中...');
            await initDB();
            console.log('数据库初始化完成');

            // 初始化文章富文本编辑器
            quill = new Quill('#editor', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, false] }],
                        ['image', 'code-block', 'link'],
                        ['bold', 'italic', 'underline'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }]
                    ]
                }
            });

            // 初始化个人资料富文本编辑器
            profileEditors.info = new Quill('#profile-editor-info', {
                theme: 'snow',
                modules: {
                    toolbar: ['bold', 'italic', 'underline', { 'list': 'bullet' }]
                }
            });
            
            profileEditors.edu = new Quill('#profile-editor-edu', {
                theme: 'snow',
                modules: {
                    toolbar: ['bold', 'italic', 'underline', { 'list': 'bullet' }]
                }
            });
            
            profileEditors.work = new Quill('#profile-editor-work', {
                theme: 'snow',
                modules: {
                    toolbar: ['bold', 'italic', 'underline', { 'list': 'bullet' }]
                }
            });
            
            profileEditors.goal = new Quill('#profile-editor-goal', {
                theme: 'snow',
                modules: {
                    toolbar: ['bold', 'italic', 'underline', { 'list': 'bullet' }]
                }
            });

            // 强制显示登录框，清除之前的登录状态
            localStorage.removeItem('isLoggedIn');
            console.log('Admin页面加载完成');
        } catch (error) {
            console.error('Admin页面加载失败:', error);
        }
    });

    // 登录逻辑
    function login() {
        const input = document.getElementById('password-input').value;
        if (input === DEFAULT_PASS) {
            localStorage.setItem('isLoggedIn', 'true');
            showAdmin();
        } else {
            alert('密码错误');
        }
    }

    function showAdmin() {
        document.getElementById('login-modal').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        loadConfig();
        loadPostList();
        loadCommentList();
        loadImages();
    }

    // 切换标签
    function switchTab(tabName) {
        // 隐藏所有标签内容
        document.querySelectorAll('.tab-content').forEach(tab => {
            tab.classList.remove('active');
        });
        
        // 移除所有标签的激活状态
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.classList.remove('active');
        });
        
        // 显示选中的标签内容
        document.getElementById(tabName + '-tab').classList.add('active');
        
        // 激活选中的标签
        event.target.classList.add('active');
        
        // 如果切换到图片管理标签，加载图片列表
        if (tabName === 'images') {
            loadImages();
        }
    }

    // 处理头像上传
    function handleAvatarUpload(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('avatar-preview').innerHTML = `<img src="${e.target.result}" class="preview-img">`;
                document.getElementById('conf-avatar').value = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 处理图片上传
    function handleImageUpload(input) {
        if (input.files && input.files.length > 0) {
            Array.from(input.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const imageData = {
                        id: Date.now(),
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        data: e.target.result,
                        uploadedAt: new Date().toISOString()
                    };
                    await DB.add('images', imageData);
                    loadImages();
                };
                reader.readAsDataURL(file);
            });
        }
    }
    
    // 加载图片列表
    async function loadImages() {
        const images = await DB.getAll('images');
        const imageGrid = document.getElementById('image-grid');
        if (imageGrid) {
            imageGrid.innerHTML = images.map(image => `
                <div class="image-item">
                    <img src="${image.data}" alt="${image.name}">
                    <div class="image-info">
                        ${image.name}
                        <br>
                        <button class="btn btn-danger" onclick="deleteImage(${image.id})" style="margin-top: 0.5rem; padding: 0.25rem 0.5rem; font-size: 0.7rem;">删除</button>
                    </div>
                </div>
            `).join('');
        }
    }
    
    // 删除图片
    async function deleteImage(id) {
        if (confirm('确定要删除这张图片吗？此操作无法恢复。')) {
            await DB.delete('images', id);
            loadImages();
        }
    }
    
    // 显示图片选择器
    async function showImageSelector() {
        const images = await DB.getAll('images');
        
        if (images.length === 0) {
            alert('请先上传图片到图片管理中');
            switchTab('images');
            return;
        }
        
        // 创建图片选择器弹窗
        const modal = document.createElement('div');
        modal.className = 'image-selector-modal';
        modal.id = 'image-selector-modal';
        
        modal.innerHTML = `
            <div class="image-selector-content">
                <div class="image-selector-header">
                    <h3>选择封面图片</h3>
                    <button class="image-selector-close" onclick="document.getElementById('image-selector-modal').remove()">×</button>
                </div>
                <div class="image-selector-grid" id="image-selector-grid">
                    ${images.map(image => `
                        <div class="image-selector-item" onclick="selectImage('${image.data}')">
                            <img src="${image.data}" alt="${image.name}">
                        </div>
                    `).join('')}
                </div>
                <div class="image-selector-actions">
                    <button class="btn btn-primary" onclick="document.getElementById('image-selector-modal').remove()">取消</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(modal);
    }
    
    // 选择图片
    function selectImage(imageData) {
        document.getElementById('cover-preview').innerHTML = `<img src="${imageData}" class="preview-img">`;
        document.getElementById('post-cover').value = imageData;
        document.getElementById('image-selector-modal').remove();
    }
    
    // 处理背景图片上传
    function handleBackgroundUpload(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('background-preview').innerHTML = `<img src="${e.target.result}" class="preview-img">`;
                document.getElementById('conf-background').value = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 保存个人资料配置
    async function saveConfig() {
        const profile = {
            key: 'profile',
            name: document.getElementById('conf-name').value,
            subtitle: document.getElementById('conf-subtitle').value,
            bio: document.getElementById('conf-subtitle').value,
            avatar: document.getElementById('conf-avatar').value,
            background: document.getElementById('conf-background').value,
            info: profileEditors.info.root.innerHTML,
            education: profileEditors.edu.root.innerHTML,
            work: profileEditors.work.root.innerHTML,
            goal: profileEditors.goal.root.innerHTML
        };
        await DB.put('config', profile);
        alert('个人资料已保存！刷新主页查看效果。');
    }

    // 加载配置到表单
    async function loadConfig() {
        try {
            const configs = await DB.getAll('config');
            console.log('加载配置:', configs);
            const profile = configs.find(c => c.key === 'profile');
            if (profile) {
                console.log('找到个人资料:', profile);
                document.getElementById('conf-name').value = profile.name || '';
                document.getElementById('conf-subtitle').value = profile.subtitle || '';
                document.getElementById('conf-avatar').value = profile.avatar || '';
                document.getElementById('conf-background').value = profile.background || '';
                
                if (profile.avatar) {
                    document.getElementById('avatar-preview').innerHTML = `<img src="${profile.avatar}" class="preview-img">`;
                }
                
                if (profile.background) {
                    document.getElementById('background-preview').innerHTML = `<img src="${profile.background}" class="preview-img">`;
                }
                
                // 确保编辑器内容正确加载
                if (profileEditors.info) {
                    profileEditors.info.root.innerHTML = profile.info || '';
                }
                if (profileEditors.edu) {
                    profileEditors.edu.root.innerHTML = profile.education || '';
                }
                if (profileEditors.work) {
                    profileEditors.work.root.innerHTML = profile.work || '';
                }
                if (profileEditors.goal) {
                    profileEditors.goal.root.innerHTML = profile.goal || '';
                }
            } else {
                console.log('未找到个人资料配置');
            }
        } catch (error) {
            console.error('加载配置失败:', error);
        }
    }

    // 保存文章（支持图片 Base64）
    async function savePost() {
        const id = document.getElementById('post-id').value;
        const title = document.getElementById('post-title').value;
        const type = document.getElementById('post-type').value;
        const content = quill.root.innerHTML;

        if (!title || !content) return alert('标题和内容不能为空');

        const postData = {
            id: id ? parseInt(id) : Date.now(), // 如果没有ID则生成新ID
            title: title,
            type: type,
            excerpt: document.getElementById('post-excerpt').value,
            cover: document.getElementById('post-cover').value,
            content: content,
            date: new Date().toISOString()
        };

        await DB.put('posts', postData);
        alert('文章保存成功！');
        resetForm();
        loadPostList();
    }

    // 加载文章列表
    async function loadPostList() {
        const posts = await DB.getAll('posts');
        const tbody = document.getElementById('post-list-body');
        tbody.innerHTML = posts.map(post => `
            <tr>
                <td>${post.title}</td>
                <td>${post.type === 'story' ? '成长故事' : '学习成果'}</td>
                <td>${new Date(post.date).toLocaleDateString()}</td>
                <td>
                    <button class="btn btn-primary" onclick="editPost(${post.id})">编辑</button>
                    <button class="btn btn-danger" onclick="deletePost(${post.id})">删除</button>
                </td>
            </tr>
        `).join('');
    }

    // 加载留言列表
    async function loadCommentList() {
        try {
            const comments = await DB.getAll('comments') || [];
            const tbody = document.getElementById('comment-list-body');
            tbody.innerHTML = comments.map(comment => `
                <tr>
                    <td>${comment.author || '访客'}</td>
                    <td>${comment.content.substring(0, 50)}${comment.content.length > 50 ? '...' : ''}</td>
                    <td>${new Date(comment.date).toLocaleString()}</td>
                    <td>
                        <button class="btn btn-danger" onclick="deleteComment(${comment.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        } catch (error) {
            console.log('加载留言列表失败:', error);
        }
    }

    // 编辑文章
    async function editPost(id) {
        const posts = await DB.getAll('posts');
        const post = posts.find(p => p.id === id);
        if (post) {
            document.getElementById('post-id').value = post.id;
            document.getElementById('post-title').value = post.title;
            document.getElementById('post-type').value = post.type;
            document.getElementById('post-cover').value = post.cover || '';
            document.getElementById('post-excerpt').value = post.excerpt || '';

            // 显示封面图预览
            if (post.cover) {
                document.getElementById('cover-preview').innerHTML = `<img src="${post.cover}" class="preview-img">`;
            }

            // 回填富文本内容
            quill.root.innerHTML = post.content;

            // 切换到文章编辑标签
            switchTab('posts');
            
            // 滚动到顶部
            window.scrollTo(0, 0);
        }
    }

    // 删除文章
    async function deletePost(id) {
        if (confirm('确定要删除这篇文章吗？此操作无法恢复。')) {
            await DB.delete('posts', id);
            loadPostList(); // 刷新列表
        }
    }

    // 删除留言
    async function deleteComment(id) {
        if (confirm('确定要删除这条留言吗？此操作无法恢复。')) {
            await DB.delete('comments', id);
            loadCommentList(); // 刷新列表
        }
    }

    // 重置表单
    function resetForm() {
        document.getElementById('post-id').value = '';
        document.getElementById('post-title').value = '';
        document.getElementById('post-cover').value = '';
        document.getElementById('post-excerpt').value = '';
        document.getElementById('cover-preview').innerHTML = '';
        quill.root.innerHTML = '';
    }

    // 监听图片上传工具栏按钮，将其转换为 Base64
    quill.root.addEventListener('paste', (e) => {
        const clipboard = e.clipboardData || window.clipboardData;
        const items = clipboard.items;

        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                const file = items[i].getAsFile();
                const reader = new FileReader();
                reader.onload = (event) => {
                    // 插入图片到光标处
                    const range = quill.getSelection(true);
                    quill.insertEmbed(range.index, 'image', event.target.result);
                };
                reader.readAsDataURL(file);
            }
        }
    });

</script>
